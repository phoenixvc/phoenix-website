name: 'Build Vite App'
description: 'Builds a Vite application with proper configuration'

inputs:
  app-name:
    description: 'Name of the app to build (web/design-system)'
    required: true
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'  # Updated to current LTS version
  environment:
    description: 'Build environment (production/staging)'
    required: false
    default: 'staging'

outputs:
  version:
    description: 'The package version'
  author:
    description: 'The package author'


runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4  # Updated from v3
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Retrieve Package Metadata
      id: metadata
      shell: bash
      working-directory: apps/${{ inputs.app-name }}
      run: |
        version=$(node -p "require('./package.json').version")
        author=$(node -p "require('./package.json').author")
        echo "Package Version: $version"
        echo "Package Author: $author"
        echo "Package Repository: $repository"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "author=$author" >> $GITHUB_OUTPUT

    - name: Build
      shell: bash
      working-directory: apps/${{ inputs.app-name }}  # Better than cd
      run: pnpm run build
