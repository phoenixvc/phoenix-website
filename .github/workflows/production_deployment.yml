env:
  LOCATION_CODE: euw

name: Deploy to Production

# Manual trigger + callable from staging workflow
on:
  workflow_dispatch:
    inputs:
      artifactSource:
        description: 'Artifact source'
        type: choice
        options:
          - 'latest'
          - 'specific'
        default: 'latest'
      artifactId:
        description: 'Artifact ID (only if source is "specific", format: web-dist-YYYYMMDD_HHMMSS)'
        required: false
      runID:
        description: 'Run ID (only if source is "specific")'
        required: false
      includeDnsUpdate:
        description: 'Include DNS configuration update'
        type: boolean
        default: false
  # Allow staging workflow to call this
  workflow_call:
    inputs:
      artifactSource:
        type: string
        default: 'specific'
      artifactId:
        type: string
        required: true
      runID:
        type: string
        required: true
      includeDnsUpdate:
        type: boolean
        default: false

jobs:
  # ───────────────────────────────────────────────
  # ✅ RESOLVE ARTIFACT
  # ───────────────────────────────────────────────
  resolve_artifact:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.resolve.outputs.artifact_id }}
      run_id: ${{ steps.resolve.outputs.run_id }}
      deployment_id: ${{ steps.resolve.outputs.deployment_id }}
    steps:
      - name: Find Latest Staging Artifact
        id: find_latest
        if: inputs.artifactSource == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Finding latest successful staging deployment..."

          # Get the latest successful staging workflow runs
          echo "Fetching workflow runs..."
          RUNS_RESPONSE=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/deploy.yml/runs?status=success&per_page=10")

          echo "Response received, extracting run IDs..."
          RUN_IDS=$(echo "$RUNS_RESPONSE" | jq -r '.workflow_runs[].id' | head -5)

          if [[ -z "$RUN_IDS" ]]; then
            echo "❌ No successful staging deployments found"
            exit 1
          fi

          echo "Found runs: $RUN_IDS"

          # Try each run to find one with a valid artifact
          for RUN_ID in $RUN_IDS; do
            echo "Checking run $RUN_ID for artifacts..."

            ARTIFACTS_RESPONSE=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts")

            ARTIFACT_NAME=$(echo "$ARTIFACTS_RESPONSE" | jq -r '.artifacts[] | select(.name | startswith("web-dist-")) | .name' | head -1)

            if [[ -n "$ARTIFACT_NAME" && "$ARTIFACT_NAME" != "null" ]]; then
              echo "✅ Found artifact: $ARTIFACT_NAME from run: $RUN_ID"
              echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "  No web-dist artifact in run $RUN_ID (may be expired)"
            fi
          done

          echo "❌ No web-dist artifact found in any recent successful runs"
          echo "Note: Artifacts expire after 90 days. You may need to run staging first."
          exit 1

      - name: Resolve Artifact Details
        id: resolve
        run: |
          if [[ "${{ inputs.artifactSource }}" == "latest" ]]; then
            ARTIFACT_ID="${{ steps.find_latest.outputs.artifact_name }}"
            RUN_ID="${{ steps.find_latest.outputs.run_id }}"
          else
            ARTIFACT_ID="${{ inputs.artifactId }}"
            RUN_ID="${{ inputs.runID }}"
          fi

          DEPLOYMENT_ID="prod_${RUN_ID}_${{ github.run_id }}"

          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

          echo "📦 Artifact: $ARTIFACT_ID"
          echo "🔢 Run ID: $RUN_ID"
          echo "🆔 Deployment ID: $DEPLOYMENT_ID"

      - name: Validate Artifact Format
        run: |
          ARTIFACT_ID="${{ steps.resolve.outputs.artifact_id }}"

          if [[ -z "$ARTIFACT_ID" ]]; then
            echo "❌ Artifact ID is required"
            exit 1
          fi

          if [[ ! "$ARTIFACT_ID" =~ ^web-dist-[0-9]{8}_[0-9]{6}$ ]]; then
            echo "❌ Invalid artifact ID format: $ARTIFACT_ID"
            echo "Expected format: web-dist-YYYYMMDD_HHMMSS"
            exit 1
          fi

          echo "✅ Artifact format validated: $ARTIFACT_ID"

  # ───────────────────────────────────────────────
  # ✅ DEPLOY PRODUCTION RESOURCES
  # ───────────────────────────────────────────────
  deploy_resources_production:
    runs-on: ubuntu-latest
    needs: resolve_artifact
    # GitHub Environment protection handles approval here
    environment:
      name: production
    outputs:
      staticSiteUrl: ${{ steps.deploy_production_resources.outputs.staticSiteUrl }}
      teamsLogicAppUrl: ${{ steps.deploy_production_resources.outputs.teamsLogicAppUrl }}
      githubLogicAppUrl: ${{ steps.deploy_production_resources.outputs.githubLogicAppUrl }}
      deployment_id: ${{ needs.resolve_artifact.outputs.deployment_id }}
      artifact_id: ${{ needs.resolve_artifact.outputs.artifact_id }}
      run_id: ${{ needs.resolve_artifact.outputs.run_id }}
    steps:
      - name: Log Deployment Info
        run: |
          echo "🚀 Starting production deployment"
          echo "📦 Artifact: ${{ needs.resolve_artifact.outputs.artifact_id }}"
          echo "🔢 Source Run ID: ${{ needs.resolve_artifact.outputs.run_id }}"
          echo "🆔 Deployment ID: ${{ needs.resolve_artifact.outputs.deployment_id }}"
          echo "👤 Triggered by: ${{ github.actor }}"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: phoenixvc/PhoenixVC-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Deploy Production Resources
        id: deploy_production_resources
        uses: ./.github/actions/deploy-azure-resources
        with:
          environment: production
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
          location_code: ${{ env.LOCATION_CODE }}
          repository: phoenixvc/PhoenixVC-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          skip_logic_apps: true

  # ───────────────────────────────────────────────
  # ✅ SWA DEPLOYMENT VIA SWA CLI
  # ───────────────────────────────────────────────
  swa_deploy_production:
    runs-on: ubuntu-latest
    needs: deploy_resources_production
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.swa_deploy.outputs.deployment_url }}
    outputs:
      production_url: ${{ steps.swa_deploy.outputs.deployment_url }}
      deployment_id: ${{ steps.swa_deploy.outputs.deployment_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: phoenixvc/PhoenixVC-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Use SWA Deploy Action for Production
        id: swa_deploy
        uses: ./.github/actions/swa-deploy
        with:
          artifact-name: ${{ needs.deploy_resources_production.outputs.artifact_id }}
          run-id: ${{ needs.deploy_resources_production.outputs.run_id }}
          app-name: prod-${{ env.LOCATION_CODE }}-swa-phoenixvc-website
          resource-group: prod-${{ env.LOCATION_CODE }}-rg-phoenixvc-website
          env: production
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
          deployment_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify SWA Deployment
        run: |
          URL="${{ needs.deploy_resources_production.outputs.staticSiteUrl }}"

          if [[ -z "$URL" ]]; then
            echo "❌ URL is empty. Check your deploy_resources_production outputs."
            exit 1
          fi

          MAX_RETRIES=10
          COUNT=0
          while [ $COUNT -lt $MAX_RETRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" == "200" ]; then
              echo "✅ SWA deployment verified successfully at $URL!"
              exit 0
            fi
            echo "⏳ Waiting for deployment at $URL... (Attempt $((COUNT + 1))/$MAX_RETRIES)"
            sleep 30
            COUNT=$((COUNT+1))
          done

          echo "❌ SWA deployment verification failed at $URL after $MAX_RETRIES attempts"
          exit 1

      - name: Record Version
        run: |
          echo "DEPLOY_VERSION=$(date '+%Y%m%d')_${{ needs.deploy_resources_production.outputs.run_id }}" >> $GITHUB_ENV

      - name: Create Version Tag
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/prod_${{ env.DEPLOY_VERSION }}',
              sha: context.sha
            })

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

  trigger_dns_update:
    needs: swa_deploy_production
    if: needs.swa_deploy_production.result == 'success' && inputs.includeDnsUpdate == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DNS Configuration
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/configure_dns.yml/dispatches \
            -d '{"ref": "refs/heads/main", "inputs": {"ENVIRONMENT": "prod"}}'

  deploy_docs:
    needs: swa_deploy_production
    if: needs.swa_deploy_production.result == 'success'
    runs-on: ubuntu-latest
    env:
      DOCS_DEPLOYMENT_TOKEN: ${{ secrets.DOCS_DEPLOYMENT_TOKEN }}
    outputs:
      docs_url: ${{ steps.deploy_docs_swa.outputs.static_web_app_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: phoenixvc/PhoenixVC-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-minify-plugin mkdocs-awesome-pages-plugin mkdocs-section-index mkdocs-redirects cairosvg pillow

      - name: Build Docs
        run: |
          mkdocs build -f docs/mkdocs.yml -d docs/site

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Docs to Azure Static Web App
        if: env.DOCS_DEPLOYMENT_TOKEN != ''
        id: deploy_docs_swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.DOCS_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "docs/site"
          skip_app_build: true
          skip_api_build: true

      - name: Skip Docs Deploy
        if: env.DOCS_DEPLOYMENT_TOKEN == ''
        run: echo "DOCS_DEPLOYMENT_TOKEN is not configured; skipping docs Static Web App deploy."

      - name: Configure docs.phoenixvc.tech Custom Domain
        if: env.DOCS_DEPLOYMENT_TOKEN != ''
        run: |
          RESOURCE_GROUP="prod-${{ env.LOCATION_CODE }}-rg-phoenixvc-website"
          DOCS_SWA_NAME="prod-${{ env.LOCATION_CODE }}-swa-phoenixvc-docs"
          DOMAIN="docs.phoenixvc.tech"

          echo "Configuring custom domain $DOMAIN for docs..."

          DOMAIN_STATUS=$(az staticwebapp hostname show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$DOCS_SWA_NAME" \
            --hostname "$DOMAIN" \
            --query "status" -o tsv 2>/dev/null || echo "NotFound")

          if [[ "$DOMAIN_STATUS" == "NotFound" ]]; then
            echo "Adding custom domain: $DOMAIN"
            az staticwebapp hostname set \
              --resource-group "$RESOURCE_GROUP" \
              --name "$DOCS_SWA_NAME" \
              --hostname "$DOMAIN" || echo "Domain setup may require manual DNS configuration"
          else
            echo "✅ Custom domain $DOMAIN already configured (status: $DOMAIN_STATUS)"
          fi

  # ───────────────────────────────────────────────
  # ✅ Configure Custom Domain and DNS
  # ───────────────────────────────────────────────
  configure_custom_domain_dns:
    runs-on: ubuntu-latest
    needs: swa_deploy_production
    environment:
      name: production
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Custom Domain & DNS
        shell: bash
        run: |
          RESOURCE_GROUP="prod-${{ env.LOCATION_CODE }}-rg-phoenixvc-website"
          STATIC_WEB_APP_NAME="prod-${{ env.LOCATION_CODE }}-swa-phoenixvc-website"
          DOMAIN="phoenixvc.tech"

          echo "Checking domain status for $DOMAIN..."

          DOMAIN_STATUS=$(az staticwebapp hostname show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$STATIC_WEB_APP_NAME" \
            --hostname "$DOMAIN" \
            --query "status" -o tsv 2>/dev/null || echo "NotFound")

          echo "Domain status: $DOMAIN_STATUS"

          if [[ "$DOMAIN_STATUS" != "Ready" ]]; then
            echo "Linking custom domain: $DOMAIN"

            az staticwebapp hostname set \
              --resource-group "$RESOURCE_GROUP" \
              --name "$STATIC_WEB_APP_NAME" \
              --hostname "$DOMAIN" \
              --validation-method dns-txt-token

            echo "Fetching validation token..."
            sleep 30

            VALIDATION_TOKEN=$(az staticwebapp hostname show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$STATIC_WEB_APP_NAME" \
              --hostname "$DOMAIN" \
              --query "validationToken" -o tsv)

            if [[ -z "$VALIDATION_TOKEN" ]]; then
              echo "❌ Validation token retrieval failed."
              exit 1
            fi

            echo "Adding TXT record for domain validation"
            az network dns record-set txt add-record \
              --resource-group "$RESOURCE_GROUP" \
              --zone-name "$DOMAIN" \
              --record-set-name "asuid" \
              --value "$VALIDATION_TOKEN"

            echo "✅ TXT record created successfully."
          else
            echo "✅ Domain already verified. Skipping TXT validation."
          fi

          echo "Adding or updating CNAME record..."

          DEFAULT_HOSTNAME=$(az staticwebapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$STATIC_WEB_APP_NAME" \
            --query "defaultHostname" -o tsv)

          if az network dns record-set cname set-record \
            --resource-group "$RESOURCE_GROUP" \
            --zone-name "$DOMAIN" \
            --record-set-name "@" \
            --cname "$DEFAULT_HOSTNAME"; then
            echo "✅ DNS CNAME configured."
          else
            echo "⚠️ CNAME record was not updated. This is expected when apex DNS already uses other record types and the Static Web App hostname is Ready."
          fi

          echo "✅ DNS configuration completed successfully."

  # ───────────────────────────────────────────────
  # ✅ Notification Job
  # ───────────────────────────────────────────────
  notify_deployment:
    needs: [deploy_resources_production, swa_deploy_production, trigger_dns_update, deploy_docs, configure_custom_domain_dns]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: phoenixvc/PhoenixVC-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Notify Teams
        uses: ./.github/actions/teams-notification
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: ${{ needs.swa_deploy_production.result == 'success' && 'Production Deployment Complete' || 'Production Deployment Failed' }}
          message: ${{ needs.swa_deploy_production.result == 'success' && 'The deployment to PRODUCTION has completed successfully.' || 'The deployment to PRODUCTION has failed. Manual intervention required.' }}
          environment: "production"
          deployment_url: ${{ needs.swa_deploy_production.outputs.production_url }}
          logic_app_url: ${{ needs.deploy_resources_production.outputs.teamsLogicAppUrl }}
          github_logic_app_url: ${{ needs.deploy_resources_production.outputs.githubLogicAppUrl }}
          branch: ${{ github.ref }}
          location_code: ${{ env.LOCATION_CODE }}
          resource_group: prod-${{ env.LOCATION_CODE }}-rg-phoenixvc-website
          color: ${{ needs.swa_deploy_production.result == 'success' && '00A300' || 'FF0000' }}
          deployment_id: ${{ needs.deploy_resources_production.outputs.deployment_id }}
          artifact_id: ${{ needs.deploy_resources_production.outputs.artifact_id }}
          run_id: ${{ needs.deploy_resources_production.outputs.run_id }}
